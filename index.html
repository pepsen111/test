<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🍕 Pizza Express · Симулятор доставки</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #fff7e6 0%, #feeac9 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      margin: 0;
    }

    /* главная карточка */
    .game-container {
      max-width: 900px;
      width: 100%;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 48px;
      box-shadow: 0 25px 40px -10px rgba(0, 0, 0, 0.2), 0 8px 20px rgba(206, 92, 0, 0.08);
      padding: 28px 30px 35px;
      border: 1px solid rgba(255, 215, 150, 0.5);
      transition: transform 0.2s ease;
    }

    .game-container:hover {
      transform: scale(1.002);
    }

    /* шапка с балансом */
    .wallet-section {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #1e1e2a;
      padding: 18px 28px;
      border-radius: 120px;
      margin-bottom: 30px;
      box-shadow: 0 12px 0 #0b0b10, 0 8px 20px rgba(0,0,0,0.2);
      border: 1px solid #ffb55a;
    }

    .wallet-info {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .wallet-icon {
      font-size: 36px;
      filter: drop-shadow(0 4px 4px rgba(0,0,0,0.3));
    }

    .balance-display {
      color: #ffd78c;
      font-weight: 800;
      font-size: 2.6rem;
      letter-spacing: 1px;
      text-shadow: 0 3px 0 #7a3e00;
    }

    .balance-label {
      color: #b9b9d6;
      font-weight: 500;
      font-size: 1rem;
      margin-left: 6px;
    }

    /* кнопка дохода */
    .earn-button {
      background: radial-gradient(circle at 20% 20%, #ffb347, #ff8c00);
      border: none;
      color: #1e1e2a;
      font-weight: 800;
      font-size: 1.4rem;
      padding: 14px 32px;
      border-radius: 60px;
      cursor: pointer;
      box-shadow: 0 8px 0 #b45f00, 0 6px 16px rgba(255, 140, 0, 0.5);
      border: 1px solid #ffe694;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: all 0.07s cubic-bezier(0.2, 1.6, 0.5, 1);
      letter-spacing: 0.5px;
      transform: translateY(0);
    }

    .earn-button:active {
      transform: translateY(5px);
      box-shadow: 0 3px 0 #b45f00, 0 6px 16px rgba(255, 140, 0, 0.5);
    }

    .earn-button:hover {
      background: radial-gradient(circle at 30% 30%, #ffc470, #ff9f1a);
      box-shadow: 0 8px 0 #b45f00, 0 10px 20px rgba(255, 140, 0, 0.6);
    }

    .earn-emoji {
      font-size: 28px;
      filter: drop-shadow(0 2px 2px black);
    }

    /* сетка пицц */
    .pizza-menu {
      margin: 30px 0 18px;
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
      color: #3d2a1a;
      font-weight: 700;
      font-size: 1.8rem;
      text-shadow: 2px 2px 0 #ffe0b3;
    }

    .pizza-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 16px;
    }

    /* карточка пиццы */
    .pizza-card {
      background: white;
      border-radius: 28px;
      padding: 18px 10px 14px;
      box-shadow: 0 12px 0 #a05f2c, 0 10px 20px -5px rgba(100, 50, 10, 0.2);
      border: 1px solid #ffddbb;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      transition: all 0.25s ease;
      cursor: pointer;
      transform: translateY(0);
      animation: card-float 4s infinite alternate ease-in-out;
    }

    /* разная задержка анимации для живости */
    .pizza-card:nth-child(1) { animation-delay: 0s; }
    .pizza-card:nth-child(2) { animation-delay: 0.4s; }
    .pizza-card:nth-child(3) { animation-delay: 0.2s; }
    .pizza-card:nth-child(4) { animation-delay: 0.6s; }
    .pizza-card:nth-child(5) { animation-delay: 0.1s; }

    @keyframes card-float {
      0% { transform: translateY(0px); }
      100% { transform: translateY(-6px); }
    }

    .pizza-card:hover {
      box-shadow: 0 8px 0 #a05f2c, 0 18px 28px -8px #cc7f3a;
      transform: translateY(-2px) scale(1.02);
      background: #fffbf5;
      border-color: #ffb26e;
      animation-play-state: paused;
    }

    .pizza-card:active {
      transform: translateY(5px);
      box-shadow: 0 4px 0 #7a421e, 0 10px 18px -5px #b45f2e;
    }

    .pizza-emoji {
      font-size: 64px;
      margin-bottom: 8px;
      filter: drop-shadow(0 8px 8px rgba(0,0,0,0.15));
      transition: transform 0.2s;
    }

    .pizza-card:hover .pizza-emoji {
      transform: rotate(3deg) scale(1.1);
    }

    .pizza-name {
      font-weight: 800;
      font-size: 1.25rem;
      color: #2d1c0c;
      margin-bottom: 8px;
    }

    .pizza-price {
      background: #4a3620;
      padding: 6px 18px;
      border-radius: 40px;
      color: #ffe6b3;
      font-weight: 700;
      font-size: 1.2rem;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.2), 0 3px 0 #1f150a;
      border-bottom: 1px solid #aa7942;
      margin: 6px 0 12px;
    }

    .buy-indicator {
      font-size: 1rem;
      background: #ffeedb;
      padding: 5px 12px;
      border-radius: 30px;
      color: #5a3e25;
      font-weight: 600;
      width: fit-content;
      margin: 0 auto;
      border: 1px solid #efc48c;
      transition: background 0.2s;
    }

    /* панель действий доставки */
    .delivery-panel {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 30px;
      background: #ffe1b9;
      border-radius: 60px;
      padding: 8px 8px 8px 24px;
      border: 2px dashed #c97f2e;
    }

    .delivery-message {
      font-weight: 600;
      color: #412d1a;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .deliver-btn {
      background: #c7512c;
      border: none;
      color: white;
      font-weight: 700;
      font-size: 1.2rem;
      padding: 14px 32px;
      border-radius: 50px;
      box-shadow: 0 6px 0 #732e18, 0 4px 12px rgba(190, 70, 20, 0.3);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: 0.07s;
      transform: translateY(0);
      border: 1px solid #ffb28b;
    }

    .deliver-btn:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 #732e18, 0 4px 12px #a04020;
    }

    .deliver-btn:disabled {
      opacity: 0.5;
      transform: none;
      box-shadow: 0 4px 0 #732e18;
      pointer-events: none;
      filter: grayscale(0.3);
    }

    /* уведомление (тост-анимация) */
    .notification-toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e1e2a;
      color: #ffd966;
      padding: 16px 32px;
      border-radius: 60px;
      font-weight: 700;
      font-size: 1.3rem;
      box-shadow: 0 20px 30px -5px black;
      border-left: 8px solid #ffa726;
      z-index: 999;
      opacity: 0;
      transition: opacity 0.25s ease, transform 0.3s ease;
      pointer-events: none;
      white-space: nowrap;
    }

    .notification-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(-10px);
      pointer-events: none;
    }

    .reset-area {
      display: flex;
      justify-content: flex-end;
      margin-top: 10px;
    }

    .reset-link {
      color: #8b5e2e;
      font-weight: 500;
      text-decoration: underline dotted;
      cursor: pointer;
      font-size: 0.9rem;
      opacity: 0.7;
    }

    .reset-link:hover {
      opacity: 1;
    }

    /* анимация смены цифр */
    .balance-display {
      transition: color 0.1s;
    }

    .glow-text {
      text-shadow: 0 0 10px #ffb142;
    }
  </style>
</head>
<body>
<div class="game-container">
  <!-- Верхняя панель: баланс + кнопка заработка -->
  <div class="wallet-section">
    <div class="wallet-info">
      <span class="wallet-icon">👛</span>
      <span class="balance-display" id="balanceValue">250</span>
      <span class="balance-label">₽</span>
    </div>
    <button class="earn-button" id="earnBtn">
      <span class="earn-emoji">🛵💨</span>
      <span>+100</span>
    </button>
  </div>

  <!-- Меню из 5 пицц -->
  <div class="pizza-menu">

    <div class="pizza-grid" id="pizzaGrid"></div>
  </div>

  <!-- Блок доставки -->
  <div class="delivery-panel">

    </button>

  <!-- скрытый сброс (опционально) -->
  <div class="reset-area">

  </div>
</div>

<!-- Уведомление (всплывашка) -->
<div class="notification-toast" id="notification"></div>

      setTimeout(() => {
        notification.classList.remove('show');
      }, 1800);
    }

    // Проверка, можно ли купить пиццу
    function canAfford(pizzaPrice) {
      return balance >= pizzaPrice;
    }

        return;
      }

      selectedPizzaId = pizza.id;
      orderCount++;

    }
