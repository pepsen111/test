<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Pizza Simulator</title>
<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ff7e5f, #feb47b);
    color: white;
    text-align: center;
}

/* Анимации */
@keyframes fadeIn {
    from {opacity:0; transform: translateY(20px);}
    to {opacity:1; transform: translateY(0);}
}

@keyframes pulse {
    0% {transform: scale(1);}
    50% {transform: scale(1.1);}
    100% {transform: scale(1);}
}

/* Авторизация */
#auth {
    margin-top: 100px;
    animation: fadeIn 1s;
}

input {
    padding: 10px;
    margin: 5px;
    border-radius: 10px;
    border: none;
}

button {
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    background: white;
    color: #ff5e62;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
}

/* Основной интерфейс */
#game {
    display: none;
    animation: fadeIn 1s;
}

.container {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
}

.card {
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(10px);
    border-radius: 15px;
    padding: 15px;
    margin: 10px;
    width: 180px;
    animation: fadeIn 0.5s;
}

.card:hover {
    transform: translateY(-5px);
}

.inventory {
    margin-top: 20px;
}

.boy {
    margin-top: 30px;
    font-size: 24px;
    animation: pulse 2s infinite;
}

.msg {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #4caf50;
    padding: 10px 20px;
    border-radius: 10px;
}
</style>
</head>
<body>

<div id="auth">
    <h2>🔐 Вход / Регистрация</h2>
    <input id="login" placeholder="Логин"><br>
    <input id="password" type="password" placeholder="Пароль"><br>
    <button onclick="register()">Регистрация</button>
    <button onclick="loginUser()">Войти</button>
</div>

<div id="game">
    <h1>🍕 Pizza Simulator</h1>
    <div id="wallet">Баланс: 0</div>
    <button onclick="addMoney()">+100</button>

    <div class="container" id="shop"></div>

    <h2>🎒 Инвентарь</h2>
    <div class="container inventory" id="inventory"></div>

    <div class="boy">
        👦 Толстый мальчик хочет пиццу!
        <br><button onclick="feedBoy()">Покормить</button>
    </div>
</div>

<script>
let balance = 0;
let coins = 0;
let inventory = [];
let currentUser = null;

const pizzas = [
    {name: "Маргарита", price: 120},
    {name: "С грибами", price: 150},
    {name: "С ананасами", price: 170},
    {name: "Пепперони", price: 200},
    {name: "Четыре сыра", price: 220}
];

// ===== AUTH =====
function register() {
    const login = document.getElementById("login").value;
    const password = document.getElementById("password").value;

    if (!login || !password) return alert("Заполни поля");

    localStorage.setItem(login, JSON.stringify({
        password,
        balance: 0,
        coins: 0,
        inventory: []
    }));

    alert("Зарегистрирован!");
}

function loginUser() {
    const login = document.getElementById("login").value;
    const password = document.getElementById("password").value;

    const user = JSON.parse(localStorage.getItem(login));

    if (!user || user.password !== password) {
        alert("Ошибка входа");
        return;
    }

    currentUser = login;
    balance = user.balance;
    coins = user.coins;
    inventory = user.inventory;

    document.getElementById("auth").style.display = "none";
    document.getElementById("game").style.display = "block";

    renderShop();
    renderInventory();
    updateUI();
}

// ===== GAME =====
function save() {
    localStorage.setItem(currentUser, JSON.stringify({
        password: JSON.parse(localStorage.getItem(currentUser)).password,
        balance,
        coins,
        inventory
    }));
}

function updateUI() {
    document.getElementById("wallet").innerText =
        "Баланс: " + balance + " | Coins: " + coins;
}

function addMoney() {
    balance += 100;
    updateUI();
    save();
}

function buyPizza(pizza) {
    if (balance >= pizza.price) {
        balance -= pizza.price;
        inventory.push(pizza.name);
        renderInventory();
        updateUI();
        save();
        showMsg("Куплена " + pizza.name);
    } else {
        showMsg("Нет денег!");
    }
}

function renderShop() {
    const shop = document.getElementById("shop");
    shop.innerHTML = "";

    pizzas.forEach(p => {
        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `
            <h3>${p.name}</h3>
            <p>${p.price}</p>
            <button onclick='buyPizza(${JSON.stringify(p)})'>Купить</button>
        `;
        shop.appendChild(div);
    });
}

function renderInventory() {
    const inv = document.getElementById("inventory");
    inv.innerHTML = "";

    inventory.forEach((item, index) => {
        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `
            <p>${item}</p>
            <button onclick="removePizza(${index})">Удалить</button>
        `;
        inv.appendChild(div);
    });
}

function removePizza(i) {
    inventory.splice(i, 1);
    renderInventory();
    save();
}

function feedBoy() {
    if (inventory.length === 0) {
        showMsg("Нет пиццы!");
        return;
    }

    inventory.pop();
    coins += 1;
    renderInventory();
    updateUI();
    save();
    showMsg("Мальчик доволен! +1 coin");
}

function showMsg(text) {
    const m = document.createElement("div");
    m.className = "msg";
    m.innerText = text;
    document.body.appendChild(m);
    setTimeout(()=>m.remove(), 2000);
}
</script>

</body>
</html>
