<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Pizza Simulator PRO</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    color: white;
    text-align: center;
    overflow-x: hidden;
    background: radial-gradient(circle at top, #ff7e5f, #1a1a2e);
}

/* движущийся фон */
body::before {
    content: "";
    position: fixed;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
    background-size: 50px 50px;
    animation: moveBg 20s linear infinite;
    z-index: -1;
}

@keyframes moveBg {
    from { transform: translate(0,0); }
    to { transform: translate(-200px,-200px); }
}

button {
    padding: 10px 15px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    margin: 5px;
    background: white;
    color: #ff5e62;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
}

.container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}

.card {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    border-radius: 15px;
    padding: 15px;
    margin: 10px;
    width: 180px;
}

h1 { margin-top: 20px; }
</style>
</head>

<body>

<div id="auth">
    <h2>Вход</h2>
    <input id="login" placeholder="логин"><br>
    <input id="password" type="password" placeholder="пароль"><br>
    <button onclick="register()">Регистрация</button>
    <button onclick="loginUser()">Войти</button>
</div>

<div id="game" style="display:none;">
    <h1>🍕 Pizza Simulator PRO</h1>
    <div id="wallet"></div>
    <button onclick="addMoney()">+клик</button>

    <h2>🍕 Магазин пиццы</h2>
    <div id="shop" class="container"></div>

    <h2>🎒 Инвентарь</h2>
    <div id="inventory" class="container"></div>

    <h2>🪙 Магазин улучшений</h2>
    <div id="upgradeShop" class="container"></div>

    <h2>👦 Толстый мальчик</h2>
    <button onclick="feedBoy()">Покормить</button>
</div>

<script>
// ===== ЗВУКИ =====
function playClick() {
    new Audio("https://cdn.pixabay.com/download/audio/2022/03/15/audio_click.mp3").play();
}
function playBuy() {
    new Audio("https://cdn.pixabay.com/download/audio/2022/03/15/audio_success.mp3").play();
}

// ===== ДАННЫЕ =====
let balance = 0;
let coins = 0;
let inventory = [];
let currentUser;

let clickMultiplier = 1;
let coinMultiplier = 1;
let discount = false;

const pizzas = [
    {name:"Маргарита", price:120},
    {name:"Грибы", price:150},
    {name:"Ананасы", price:170},
    {name:"Пепперони", price:200},
    {name:"4 сыра", price:220}
];

const upgrades = [
    {name:"Скидка 35%", cost:500, action:() => discount=true},
    {name:"x2 деньги", cost:300, action:() => clickMultiplier*=2},
    {name:"x2 коины", cost:400, action:() => coinMultiplier*=2}
];

// ===== AUTH =====
function register(){
    localStorage.setItem(login.value, JSON.stringify({
        password: password.value,
        balance:0, coins:0, inventory:[],
        clickMultiplier:1, coinMultiplier:1, discount:false
    }));
    alert("OK");
}

function loginUser(){
    let u = JSON.parse(localStorage.getItem(login.value));
    if(!u || u.password !== password.value) return alert("Ошибка");

    currentUser = login.value;
    Object.assign(window, u);

    auth.style.display="none";
    game.style.display="block";

    renderAll();
}

// ===== SAVE =====
function save(){
    localStorage.setItem(currentUser, JSON.stringify({
        password: JSON.parse(localStorage.getItem(currentUser)).password,
        balance, coins, inventory,
        clickMultiplier, coinMultiplier, discount
    }));
}

// ===== UI =====
function updateUI(){
    wallet.innerText =
    `Баланс: ${balance} | Coins: ${coins} | x$${clickMultiplier}`;
}

// ===== GAME =====
function addMoney(){
    playClick();
    balance += 100 * clickMultiplier;
    updateUI(); save();
}

function buyPizza(p){
    let price = discount ? Math.floor(p.price*0.65) : p.price;

    if(balance>=price){
        balance -= price;
        inventory.push(p.name);
        discount = false;
        playBuy();
        renderInventory();
        updateUI(); save();
    }
}

function feedBoy(){
    if(!inventory.length) return;

    inventory.pop();
    coins += 1 * coinMultiplier;
    playBuy();
    renderInventory();
    updateUI(); save();
}

// ===== UPGRADE SHOP =====
function buyUpgrade(u){
    if(coins>=u.cost){
        coins -= u.cost;
        u.action();
        playBuy();
        updateUI(); save();
    }
}

// ===== RENDER =====
function renderShop(){
    shop.innerHTML="";
    pizzas.forEach(p=>{
        shop.innerHTML += `
        <div class="card">
            <h3>${p.name}</h3>
            <p>${p.price}</p>
            <button onclick='buyPizza(${JSON.stringify(p)})'>Купить</button>
        </div>`;
    });
}

function renderInventory(){
    inventory.innerHTML="";
    inventory.forEach(i=>{
        inventory.innerHTML += `<div class="card">${i}</div>`;
    });
}

function renderUpgrades(){
    upgradeShop.innerHTML="";
    upgrades.forEach(u=>{
        upgradeShop.innerHTML += `
        <div class="card">
            <h3>${u.name}</h3>
            <p>${u.cost} coins</p>
            <button onclick='buyUpgrade(upgrades[${upgrades.indexOf(u)}])'>Купить</button>
        </div>`;
    });
}

function renderAll(){
    renderShop();
    renderInventory();
    renderUpgrades();
    updateUI();
}
</script>

</body>
</html>
