<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Pizza Delivery Simulator</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #ff9966, #ff5e62);
        color: white;
        text-align: center;
    }

    h1 {
        margin-top: 20px;
        font-size: 36px;
        animation: fadeIn 1s ease;
    }

    #wallet {
        font-size: 24px;
        margin: 10px;
    }

    button {
        padding: 10px 20px;
        font-size: 18px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        background: #fff;
        color: #ff5e62;
        transition: 0.3s;
    }

    button:hover {
        transform: scale(1.1);
        background: #ffe0e0;
    }

    .container {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        margin-top: 30px;
    }

    .pizza {
        background: rgba(255,255,255,0.2);
        backdrop-filter: blur(10px);
        border-radius: 15px;
        padding: 20px;
        margin: 10px;
        width: 200px;
        transition: 0.3s;
        animation: fadeInUp 0.6s ease;
    }

    .pizza:hover {
        transform: translateY(-10px) scale(1.05);
    }

    .price {
        font-size: 18px;
        margin: 10px 0;
    }

    @keyframes fadeIn {
        from {opacity: 0;}
        to {opacity: 1;}
    }

    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .success {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: #4caf50;
        padding: 15px 25px;
        border-radius: 10px;
        animation: pop 0.5s ease;
    }

    @keyframes pop {
        from { transform: translateX(-50%) scale(0); }
        to { transform: translateX(-50%) scale(1); }
    }
</style>
</head>
<body>

<h1>🍕 Симулятор доставки пиццы</h1>

<div id="wallet">Баланс: 0 ₽</div>
<button onclick="addMoney()">+100 ₽</button>

<div class="container" id="pizzaList"></div>

<script>
let balance = 0;

const pizzas = [
    {name: "Маргарита", price: 120},
    {name: "С грибами", price: 150},
    {name: "С ананасами", price: 170},
    {name: "Пепперони", price: 200},
    {name: "Четыре сыра", price: 220}
];

function updateWallet() {
    document.getElementById("wallet").innerText = "Баланс: " + balance + " ₽";
}

function addMoney() {
    balance += 100;
    updateWallet();
    showMessage("💰 +100 ₽ добавлено!");
}

function buyPizza(price, name) {
    if (balance >= price) {
        balance -= price;
        updateWallet();
        showMessage("🚚 Вы заказали: " + name);
    } else {
        showMessage("❌ Недостаточно средств!");
    }
}

function showMessage(text) {
    const msg = document.createElement("div");
    msg.className = "success";
    msg.innerText = text;
    document.body.appendChild(msg);

    setTimeout(() => {
        msg.remove();
    }, 2000);
}

function renderPizzas() {
    const container = document.getElementById("pizzaList");

    pizzas.forEach(pizza => {
        const div = document.createElement("div");
        div.className = "pizza";

        div.innerHTML = `
            <h3>${pizza.name}</h3>
            <div class="price">${pizza.price} ₽</div>
            <button onclick="buyPizza(${pizza.price}, '${pizza.name}')">Заказать</button>
        `;

        container.appendChild(div);
    });
}

renderPizzas();
</script>

</body>
</html>
