<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>🍕 PIZZA DELIVERY · СЕССИЯ & УЛЬТРА ЦЕНЫ</title>
  <!-- Шрифты -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: radial-gradient(circle at 20% 30%, #1a2637, #0b1018);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      padding: 1.5rem;
      margin: 0;
      color: #ffffff;
    }

    /* Главный контейнер */
    .game-container {
      max-width: 1300px;
      width: 100%;
      background: rgba(12, 20, 30, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 180, 60, 0.25);
      border-radius: 3.5rem;
      padding: 2rem 2rem 2.5rem;
      box-shadow: 0 30px 45px -10px #000000b0, 0 0 0 1px #ffb0451a inset;
      transition: box-shadow 0.3s;
    }

    /* Секция авторизации (скрывается при входе) */
    .auth-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 380px;
      gap: 1.5rem;
    }

    .auth-card {
      background: rgba(20, 32, 48, 0.8);
      backdrop-filter: blur(12px);
      border-radius: 3rem;
      padding: 2.2rem 2.5rem;
      width: 100%;
      max-width: 420px;
      border: 1px solid #f3b85e40;
      box-shadow: 0 20px 30px -5px #00000080, inset 0 1px 0 #fff1;
    }

    .auth-title {
      font-size: 2.3rem;
      font-weight: 800;
      text-align: center;
      margin-bottom: 1.8rem;
      background: linear-gradient(135deg, #ffeac2, #ffc97a);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.02em;
    }

    .input-group {
      margin-bottom: 1.4rem;
    }

    .input-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.4rem;
      color: #cdddf7;
      font-size: 0.95rem;
      letter-spacing: 0.3px;
    }

    .input-group input {
      width: 100%;
      padding: 1rem 1.2rem;
      background: #0e1924e0;
      border: 1.5px solid #3f556b;
      border-radius: 60px;
      font-size: 1.1rem;
      color: white;
      font-weight: 500;
      outline: none;
      transition: all 0.2s;
      box-shadow: inset 0 3px 8px #00000060;
    }

    .input-group input:focus {
      border-color: #ffae3c;
      box-shadow: 0 0 0 3px #ffae3c30, inset 0 2px 6px black;
    }

    .auth-buttons {
      display: flex;
      gap: 1rem;
      margin-top: 2rem;
    }

    .auth-btn {
      flex: 1;
      background: linear-gradient(145deg, #2e4258, #1a293b);
      border: none;
      border-bottom: 5px solid #0f1a24;
      border-radius: 60px;
      padding: 0.9rem 0.5rem;
      font-weight: 700;
      font-size: 1.2rem;
      color: #FFE1A8;
      text-shadow: 0 2px 3px black;
      cursor: pointer;
      transition: 0.15s;
      box-shadow: 0 6px 0 #0e1620, 0 8px 18px black;
    }

    .auth-btn:hover {
      background: linear-gradient(145deg, #3a5670, #243a50);
      transform: translateY(-2px);
      border-bottom-width: 5px;
      box-shadow: 0 8px 0 #0e1620, 0 12px 22px black;
    }

    .auth-btn:active {
      transform: translateY(5px);
      border-bottom-width: 2px;
      box-shadow: 0 3px 0 #0e1620, 0 8px 18px black;
    }

    .error-message {
      color: #ff9e8f;
      font-weight: 500;
      text-align: center;
      min-height: 24px;
      margin-top: 10px;
    }

    /* Основной интерфейс (скрыт до авторизации) */
    .main-interface {
      display: none;
    }

    .main-interface.active {
      display: block;
    }

    /* Шапка с юзером и выходом */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .user-greeting {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .avatar {
      background: #d99f3c;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      box-shadow: 0 4px 0 #7a4f1a, 0 6px 12px black;
      border: 1px solid #ffd58c;
    }

    .greeting-text {
      font-weight: 700;
      font-size: 1.5rem;
      color: #ffdfaa;
    }

    .logout-btn {
      background: #2d2620c0;
      backdrop-filter: blur(8px);
      border: 1px solid #b97f3a;
      color: #ffeac2;
      padding: 0.7rem 1.5rem;
      border-radius: 40px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.15s;
      box-shadow: 0 4px 0 #3d2e1d;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logout-btn:hover {
      background: #42382e;
      transform: translateY(-2px);
      box-shadow: 0 6px 0 #3d2e1d;
    }

    /* Кошелёк и баланс */
    .wallet-panel {
      background: #0f1a24cc;
      backdrop-filter: blur(8px);
      border-radius: 120px;
      padding: 0.7rem 2rem;
      border: 1px solid #f0b357;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 1rem 0 2rem;
      box-shadow: 0 10px 0 #0a121c, 0 10px 25px black, inset 0 1px 0 #ffeecc;
    }

    .wallet-label {
      font-weight: 700;
      font-size: 1.5rem;
      color: #eedbba;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .balance-display {
      font-weight: 800;
      font-size: 3.2rem;
      color: #FFDD99;
      text-shadow: 0 0 15px #f90, 0 2px 5px black;
      transition: transform 0.2s;
    }

    .balance-display.pop {
      transform: scale(1.2);
      color: #ffeaad;
    }

    /* Кнопка +100 */
    .quick-earn-wrap {
      display: flex;
      justify-content: center;
      margin: 25px 0 20px;
    }

    .earn-btn {
      background: linear-gradient(145deg, #3b5d3e, #1f3a22);
      border: none;
      border-bottom: 8px solid #0e2410;
      border-radius: 80px;
      padding: 1.2rem 4rem;
      font-weight: 800;
      font-size: 2rem;
      color: #d4ffb0;
      text-shadow: 0 2px 5px #00000090;
      box-shadow: 0 12px 20px -5px black, inset 0 1px 0 #b1ff9e;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 18px;
      transition: 0.15s;
      letter-spacing: 2px;
    }

    .earn-btn:hover {
      background: linear-gradient(145deg, #4e7a52, #2c4d2f);
      border-bottom-width: 6px;
      transform: translateY(2px);
      box-shadow: 0 10px 18px black, inset 0 1px 0 #e0ffc0;
    }

    .earn-btn:active {
      transform: translateY(7px);
      border-bottom-width: 3px;
    }

    /* Сетка пицц + инвентарь (две колонки) */
    .content-panels {
      display: grid;
      grid-template-columns: 1.5fr 1fr;
      gap: 2rem;
      margin: 2rem 0 1rem;
    }

    /* Пиццы */
    .pizza-section h2, .inventory-section h2 {
      font-size: 1.8rem;
      margin-bottom: 1.5rem;
      color: #ffd58c;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 2px dashed #b57c2e;
      padding-bottom: 10px;
    }

    .pizza-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 1.2rem;
    }

    .pizza-card {
      background: #172433dd;
      backdrop-filter: blur(10px);
      border-radius: 2rem;
      padding: 1.2rem 0.5rem 1rem;
      border: 1px solid #ffbb4d40;
      box-shadow: 0 15px 20px -8px black;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: all 0.25s;
    }

    .pizza-card:hover {
      transform: translateY(-8px);
      background: #20344ae0;
      border-color: #ffbb4d;
      box-shadow: 0 22px 28px -10px black, 0 0 15px #ffbb4d30;
    }

    .pizza-emoji {
      font-size: 4.5rem;
      filter: drop-shadow(0 8px 10px #00000080);
    }

    .pizza-name {
      font-weight: 700;
      font-size: 1.2rem;
      margin: 0.3rem 0;
    }

    .pizza-price {
      background: #1e2f40;
      padding: 0.2rem 1rem;
      border-radius: 30px;
      font-weight: 700;
      color: #ffcf7a;
      border: 1px solid #e09e3e;
      margin: 0.5rem 0;
      font-size: 1.5rem;
    }

    .deliver-btn {
      background: #c75e1a;
      border: none;
      border-bottom: 5px solid #833f0c;
      border-radius: 40px;
      padding: 0.6rem 1rem;
      width: 100%;
      font-weight: 800;
      color: #ffefcf;
      text-shadow: 0 1px 2px black;
      cursor: pointer;
      transition: 0.1s;
      margin-top: 5px;
      font-size: 1rem;
    }

    .deliver-btn:hover {
      background: #e06d24;
      border-bottom-width: 4px;
      transform: translateY(1px);
    }

    /* Инвентарь */
    .inventory-section {
      background: #0f1b26b0;
      backdrop-filter: blur(10px);
      border-radius: 2.5rem;
      padding: 1.5rem 1.5rem;
      border: 1px solid #ebae5a50;
      box-shadow: inset 0 0 20px #00000060, 0 10px 20px #00000060;
    }

    .inventory-list {
      max-height: 450px;
      overflow-y: auto;
      padding-right: 5px;
    }

    .inventory-item {
      background: #1c2b3ccc;
      border-radius: 40px;
      padding: 0.8rem 1.2rem;
      margin-bottom: 0.8rem;
      display: flex;
      align-items: center;
      gap: 15px;
      border: 1px solid #f3b05360;
      backdrop-filter: blur(4px);
      box-shadow: 0 4px 0 #0e1820;
    }

    .inv-emoji {
      font-size: 2.3rem;
    }

    .inv-details {
      flex: 1;
      font-weight: 600;
    }

    .inv-name {
      font-size: 1.2rem;
      color: #ffe5be;
    }

    .inv-count {
      font-weight: 400;
      color: #b9c9e0;
    }

    .empty-inventory {
      color: #9eb1cc;
      text-align: center;
      padding: 20px;
      font-style: italic;
    }

    /* Уведомление */
    .toast-message {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) scale(0.9);
      background: #1a293b;
      backdrop-filter: blur(30px);
      color: #FFE3A4;
      padding: 1rem 2.5rem;
      border-radius: 60px;
      font-weight: 700;
      font-size: 1.4rem;
      border: 1px solid #f3bc6e;
      box-shadow: 0 20px 30px -5px black;
      opacity: 0;
      visibility: hidden;
      transition: 0.2s;
      pointer-events: none;
      z-index: 999;
    }

    .toast-message.show {
      opacity: 1;
      visibility: visible;
      transform: translateX(-50%) scale(1);
    }

    @media (max-width: 800px) {
      .content-panels { grid-template-columns: 1fr; }
      .game-container { padding: 1.5rem; }
    }
  </style>
</head>
<body>
<div class="game-container">
  <!-- Блок авторизации -->
  <div id="authSection" class="auth-section">
    <div class="auth-card">
      <div class="auth-title">🍕 PIZZA HUB</div>
      <div class="input-group">
        <label>👤 Логин</label>
        <input type="text" id="loginInput" placeholder="Введите логин" autocomplete="off">
      </div>
      <div class="input-group">
        <label>🔒 Пароль</label>
        <input type="password" id="passwordInput" placeholder="••••••••" autocomplete="off">
      </div>
      <div id="authError" class="error-message"></div>
      <div class="auth-buttons">
        <button class="auth-btn" id="loginBtn">Войти</button>
        <button class="auth-btn" id="registerBtn">Регистрация</button>
      </div>
      <p style="text-align: center; margin-top: 1.2rem; color: #b0bedb; font-size: 0.9rem;">Доставляй пиццу, копи инвентарь!</p>
    </div>
  </div>

  <!-- Основной интерфейс игры -->
  <div id="mainInterface" class="main-interface">
    <div class="top-bar">
      <div class="user-greeting">
        <div class="avatar">👨‍🍳</div>
        <span class="greeting-text" id="usernameDisplay">Курьер</span>
      </div>
      <button class="logout-btn" id="logoutBtn">🚪 Выйти</button>
    </div>

    <!-- Кошелёк -->
    <div class="wallet-panel">
      <span class="wallet-label"><span>💰</span> БАЛАНС</span>
      <span class="balance-display" id="balanceDisplay">0</span>
    </div>

    <!-- Кнопка +100 -->
    <div class="quick-earn-wrap">
      <button class="earn-btn" id="quickEarnBtn">
        <span>⚡</span> +100 <span>💵</span>
      </button>
    </div>

    <!-- Пиццы и инвентарь -->
    <div class="content-panels">
      <div class="pizza-section">
        <h2><span>🍕</span> МЕНЮ ДОСТАВКИ</h2>
        <div class="pizza-grid" id="pizzaGrid"></div>
      </div>
      <div class="inventory-section">
        <h2><span>📦</span> ИНВЕНТАРЬ</h2>
        <div id="inventoryContainer" class="inventory-list">
          <div class="empty-inventory">Пока пусто... доставь пиццу!</div>
        </div>
      </div>
    </div>
    <div style="margin-top: 20px; text-align: right; opacity: 0.8;">🛵 версия 3.0 · сессия + ультра-цены</div>
  </div>
</div>

<!-- Toast -->
<div id="liveToast" class="toast-message">+0</div>

<script>
  (function(){
    "use strict";

    // ---------- КОНФИГУРАЦИЯ ПИЦЦ (ЕЩЁ ДОРОЖЕ) ----------
    const PIZZAS = [
      { id: 'marg', name: 'Маргарита', emoji: '🍕🧀', price: 500, baseEmoji: '🍅' },
      { id: 'mush', name: 'С грибами', emoji: '🍄🍕', price: 700, baseEmoji: '🍄' },
      { id: 'pine', name: 'С ананасами', emoji: '🍍🍕', price: 900, baseEmoji: '🍍' },
      { id: 'pep', name: 'Пепперони', emoji: '🍕🔥', price: 1100, baseEmoji: '🌶️' },
      { id: '4cheese', name: 'Четыре сыра', emoji: '🧀🧀', price: 1300, baseEmoji: '🧀' }
    ];

    // ---------- СОСТОЯНИЕ ПРИЛОЖЕНИЯ ----------
    let currentUser = null;               // { login, balance, inventory }
    let usersDB = {};                    // хранилище в localStorage

    // DOM элементы
    const authSection = document.getElementById('authSection');
    const mainInterface = document.getElementById('mainInterface');
    const loginInput = document.getElementById('loginInput');
    const passwordInput = document.getElementById('passwordInput');
    const authError = document.getElementById('authError');
    const loginBtn = document.getElementById('loginBtn');
    const registerBtn = document.getElementById('registerBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const usernameDisplay = document.getElementById('usernameDisplay');
    const balanceDisplay = document.getElementById('balanceDisplay');
    const quickEarnBtn = document.getElementById('quickEarnBtn');
    const pizzaGrid = document.getElementById('pizzaGrid');
    const inventoryContainer = document.getElementById('inventoryContainer');
    const toastEl = document.getElementById('liveToast');

    let toastTimeout = null;

    // ---------- УТИЛИТЫ ----------
    function showToast(msg, isGood = true) {
      if (toastTimeout) clearTimeout(toastTimeout);
      toastEl.textContent = msg;
      toastEl.style.color = isGood ? '#FFE3A4' : '#ffa07a';
      toastEl.classList.add('show');
      toastTimeout = setTimeout(() => toastEl.classList.remove('show'), 1400);
    }

    function saveUsersDB() {
      localStorage.setItem('pizzaDeliveryUsers', JSON.stringify(usersDB));
    }

    function loadUsersDB() {
      const stored = localStorage.getItem('pizzaDeliveryUsers');
      if (stored) {
        try { usersDB = JSON.parse(stored); } catch(e){ usersDB = {}; }
      } else {
        usersDB = {};
      }
    }

    // Сохранить данные текущего пользователя в БД и сессию
    function persistCurrentUser() {
      if (!currentUser) return;
      usersDB[currentUser.login] = {
        password: usersDB[currentUser.login]?.password || '',
        balance: currentUser.balance,
        inventory: { ...currentUser.inventory }
      };
      saveUsersDB();
      // Сохраняем активную сессию
      localStorage.setItem('pizzaActiveSession', currentUser.login);
    }

    // Очистить сессию
    function clearSession() {
      localStorage.removeItem('pizzaActiveSession');
    }

    // Обновить интерфейс баланса
    function updateBalanceUI() {
      if (!currentUser) return;
      balanceDisplay.textContent = currentUser.balance;
      balanceDisplay.classList.add('pop');
      setTimeout(() => balanceDisplay.classList.remove('pop'), 200);
    }

    // Рендер инвентаря
    function renderInventory() {
      if (!currentUser) return;
      const inv = currentUser.inventory;
      const entries = Object.entries(inv);
      if (entries.length === 0) {
        inventoryContainer.innerHTML = '<div class="empty-inventory">📭 Инвентарь пуст — доставь пиццу!</div>';
        return;
      }
      let html = '';
      for (let [pizzaId, count] of entries) {
        const pizza = PIZZAS.find(p => p.id === pizzaId);
        if (!pizza) continue;
        html += `
          <div class="inventory-item">
            <span class="inv-emoji">${pizza.emoji}</span>
            <div class="inv-details">
              <div class="inv-name">${pizza.name}</div>
              <div class="inv-count">${count} шт.</div>
            </div>
          </div>
        `;
      }
      inventoryContainer.innerHTML = html || '<div class="empty-inventory">🍕 Ничего нет</div>';
    }

    // Рендер карточек пицц
    function renderPizzaCards() {
      pizzaGrid.innerHTML = '';
      PIZZAS.forEach(pizza => {
        const card = document.createElement('div');
        card.className = 'pizza-card';
        card.innerHTML = `
          <div class="pizza-emoji">${pizza.emoji}</div>
          <div class="pizza-name">${pizza.name}</div>
          <div class="pizza-price">${pizza.price} 🪙</div>
          <button class="deliver-btn" data-id="${pizza.id}">🚚 Доставить</button>
        `;
        pizzaGrid.appendChild(card);
      });
      document.querySelectorAll('.deliver-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const pizzaId = btn.dataset.id;
          deliverPizza(pizzaId);
        });
      });
    }

    // Доставка пиццы
    function deliverPizza(pizzaId) {
      if (!currentUser) return;
      const pizza = PIZZAS.find(p => p.id === pizzaId);
      if (!pizza) return;

      currentUser.balance += pizza.price;
      
      if (!currentUser.inventory[pizzaId]) {
        currentUser.inventory[pizzaId] = 1;
      } else {
        currentUser.inventory[pizzaId] += 1;
      }

      updateBalanceUI();
      renderInventory();
      persistCurrentUser();
      showToast(`🍕 ${pizza.name} доставлена! +${pizza.price} 💰`, true);
      if (navigator.vibrate) navigator.vibrate(20);
    }

    // Быстрый заработок +100
    function quickEarn() {
      if (!currentUser) return;
      currentUser.balance += 100;
      updateBalanceUI();
      persistCurrentUser();
      showToast(`⚡ Быстрый заказ +100`, true);
      if (navigator.vibrate) navigator.vibrate(15);
    }

    // Загрузка пользователя и переключение интерфейса
    function setActiveUser(userData, login) {
      currentUser = {
        login: login,
        balance: userData.balance,
        inventory: userData.inventory ? { ...userData.inventory } : {}
      };
      usernameDisplay.textContent = login;
      updateBalanceUI();
      renderInventory();
      renderPizzaCards();
      
      authSection.style.display = 'none';
      mainInterface.classList.add('active');
      persistCurrentUser(); // обновит сессию
    }

    // Вход пользователя
    function loginUser(login, password) {
      if (!login || !password) {
        authError.textContent = 'Введите логин и пароль';
        return;
      }
      const userRecord = usersDB[login];
      if (!userRecord) {
        authError.textContent = 'Пользователь не найден';
        return;
      }
      if (userRecord.password !== password) {
        authError.textContent = 'Неверный пароль';
        return;
      }
      
      setActiveUser(userRecord, login);
      authError.textContent = '';
      loginInput.value = '';
      passwordInput.value = '';
      showToast(`👋 С возвращением, ${login}!`, true);
    }

    // Регистрация
    function registerUser(login, password) {
      if (!login || !password) {
        authError.textContent = 'Заполните все поля';
        return;
      }
      if (usersDB[login]) {
        authError.textContent = 'Логин уже занят';
        return;
      }
      // Стартовый баланс увеличен, чтобы можно было купить дорогие пиццы
      const newUser = {
        password: password,
        balance: 800,
        inventory: {}
      };
      usersDB[login] = newUser;
      saveUsersDB();
      
      setActiveUser(newUser, login);
      authError.textContent = '';
      loginInput.value = '';
      passwordInput.value = '';
      showToast(`🎉 Аккаунт создан! Добро пожаловать, ${login}!`, true);
    }

    // Выход
    function logout() {
      if (currentUser) {
        persistCurrentUser();
      }
      currentUser = null;
      mainInterface.classList.remove('active');
      authSection.style.display = 'flex';
      clearSession();
      showToast('Вы вышли из системы', true);
    }

    // Проверка сохранённой сессии
    function tryAutoLogin() {
      const savedLogin = localStorage.getItem('pizzaActiveSession');
      if (!savedLogin) return false;
      
      const userRecord = usersDB[savedLogin];
      if (!userRecord) {
        clearSession();
        return false;
      }
      
      setActiveUser(userRecord, savedLogin);
      showToast(`👤 Автовход: ${savedLogin}`, true);
      return true;
    }

    // Инициализация после загрузки
    function initApp() {
      loadUsersDB();
      
      const autoLogged = tryAutoLogin();
      if (!autoLogged) {
        authSection.style.display = 'flex';
        mainInterface.classList.remove('active');
      } else {
        authSection.style.display = 'none';
        mainInterface.classList.add('active');
      }
      
      // Обработчики
      loginBtn.addEventListener('click', () => {
        loginUser(loginInput.value.trim(), passwordInput.value);
      });
      registerBtn.addEventListener('click', () => {
        registerUser(loginInput.value.trim(), passwordInput.value);
      });
      
      logoutBtn.addEventListener('click', logout);
      
      quickEarnBtn.addEventListener('click', quickEarn);
      
      passwordInput.addEventListener('keypress', (e) => {
        if(e.key === 'Enter') loginUser(loginInput.value.trim(), passwordInput.value);
      });
      loginInput.addEventListener('keypress', (e) => {
        if(e.key === 'Enter') loginUser(loginInput.value.trim(), passwordInput.value);
      });
    }

    initApp();
  })();
</script>
</body>
</html>
